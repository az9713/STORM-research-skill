<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root { --ink:#17202a; --muted:#667085; --line:#d8dee8; --panel:#f7f9fc; --accent:#5b3fd6; }
    body { margin:0; font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); }
    main { max-width:960px; margin:auto; padding:42px 24px 72px; }
    h1 { font-size:34px; line-height:1.15; margin:0 0 8px; }
    h2 { margin-top:34px; padding-top:18px; border-top:1px solid var(--line); }
    .meta { color:var(--muted); }
    .summary, .finding { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; }
    .finding { margin:14px 0; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:#eeeaff; color:var(--accent); font-size:13px; }
    table { width:100%; border-collapse:collapse; }
    th, td { border-bottom:1px solid var(--line); padding:9px; text-align:left; vertical-align:top; }
    th { background:var(--panel); }
  </style>
</head>
<body>
<main>
  <h1>{{title}}</h1>
  <p class="meta">{{subtitle}}</p>
  <section class="summary"><h2>60-Second Summary</h2>{{summary}}</section>
  <section><h2>Key Findings</h2>{{findings}}</section>
  <section><h2>Assumptions And Missing Lens</h2>{{assumptions}}</section>
  <section><h2>Practical Takeaways</h2>{{takeaways}}</section>
  <section><h2>Source Verification</h2>{{sources}}</section>
</main>
</body>
</html>
